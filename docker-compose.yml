services:
  weather-live:
    build: .
    container_name: stream-weather
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # .env が無い場合のフォールバック既定値（.env が優先される）
      OUTPUT_W: "${OUTPUT_W:-1920}"
      OUTPUT_H: "${OUTPUT_H:-1080}"
      FPS: "${FPS:-30}"
      VIDEO_BITRATE: "${VIDEO_BITRATE:-6000k}"
      VIDEO_ENCODER: "${VIDEO_ENCODER:-libx264}"
    volumes:
      # フリーBGMをここに置く（コンテナ再ビルド不要）
      - ./bgm:/app/bgm:ro
    # 共有メモリ不足で Chromium が落ちるのを防ぐ
    shm_size: "2gb"
    ports:
      # ダッシュボードのプレビュー用（配信自体には不要）。
      # 既定はローカル限定(127.0.0.1)。LAN上の他PCから見たい場合は
      # .env に DASHBOARD_BIND=0.0.0.0 を設定する。
      # ポート衝突時は DASHBOARD_PORT を変更、または行ごと削除でOK。
      - "${DASHBOARD_BIND:-127.0.0.1}:${DASHBOARD_PORT:-18080}:8080"

  # ▼ GPU(NVENC)で8K配信する場合の構成例。利用時は上の weather-live を止め、
  #   .env で VIDEO_ENCODER=hevc_nvenc, OUTPUT_W/H=7680/4320, VIDEO_BITRATE=45000k 等に。
