<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>全国お天気チャンネル</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="app">
    <header class="bar">
      <div class="title">全国のお天気・週間天気予報を24時間お届けします</div>
      <div class="clock">
        <span id="date" class="date"></span>
        <span id="time" class="time"></span>
      </div>
    </header>

    <main>
      <!-- 左端: 今日の24時間天気（都市ローテ） -->
      <section id="left" class="hourly">
        <h2 class="sec-title">今日の天気　<span id="hourly-city" class="accent"></span></h2>
        <div id="hourly-head" class="hourly-head"></div>
        <div id="hourly-list" class="hourly-list"></div>
      </section>

      <!-- 中央: 全国情報（警報注意報 / 台風 / PM2.5）ローテ -->
      <section id="center" class="center">
        <div id="panel" class="panel"></div>
      </section>

      <!-- 最下部: 週間天気予報（都市ローテ） -->
      <section id="weekly" class="weekly">
        <h2 class="sec-title">週間天気予報　<span id="weekly-city" class="accent"></span></h2>
        <div id="week" class="week"></div>
      </section>
    </main>

    <footer class="bar foot">
      <span id="updated" class="updated">データ取得中…</span>
      <span class="source">データ：気象庁（JMA）／PM2.5：SPRINTARS　／　<span id="nowplaying">♪ —</span></span>
    </footer>
  </div>

  <!-- BGM再生用（ブラウザ音声→PulseAudio→ffmpeg） -->
  <audio id="bgm" crossorigin="anonymous"></audio>

  <script src="/app.js"></script>
</body>
</html>
